name: Keep Base Montature awake

on:
  schedule:
    # Ogni 4 ore, tutti i giorni. Un run pubblico su GitHub Actions e'
    # gratuito e senza limiti di minuti.
    - cron: "0 */4 * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: Visita l'app per tenerla sveglia
        run: python .github/scripts/keep_alive.py

      - name: Carica screenshot di diagnosi (se presente)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: failure-screenshot
          path: failure.png
          retention-days: 7
          if-no-files-found: ignore
